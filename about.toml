# cargo-about configuration — generates THIRD-PARTY-LICENSES.html, the bundle of
# dependency license notices shipped in every release archive (CONSTITUTION-DEV
# Rule 11 ships the runtime data; this adds the licenses of the statically linked
# crates, satisfying the MIT/Apache "include the copyright notice" obligation).
#
# `accepted` lists every license we have audited and allow. A crate whose license is
# NOT in this list makes `cargo about generate` FAIL — a loud tripwire if a future
# dependency introduces an unvetted (e.g. copyleft) license.
#
# GPL-2.0 / LGPL-2.1 are deliberately ABSENT: where they appear in the tree
# (`self_cell`, `r-efi`) they are an `OR` alternative, so cargo-about selects one of
# the accepted permissive licenses instead — teemlab carries no copyleft obligation.
accepted = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "Unlicense",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

# Build-/host-only crates do not ship in the binary, but enumerating their licenses
# too is harmless and keeps the notice exhaustive.
workarounds = []
