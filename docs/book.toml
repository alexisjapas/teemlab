# mdBook configuration for the teemlab documentation site.
#
# The book source lives in `docs/src/`; `mdbook build docs` renders it to
# `docs/book/` (gitignored), which the Pages workflow publishes. The dev shell
# ships `mdbook`, so `mdbook serve docs --open` previews it locally.
[book]
title = "teemlab"
description = "Evolutionary simulation engine — one engine, many scenarios."
authors = ["alexisjapas"]
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/alexisjapas/teemlab"
edit-url-template = "https://github.com/alexisjapas/teemlab/edit/main/docs/{path}"
additional-css = ["theme/custom.css"]
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.playground]
runnable = false

[output.html.search]
enable = true
limit-results = 30
